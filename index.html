<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0E1116">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="format-detection" content="telephone=no">
<title>새마을금고 수신업무 케이스 스터디</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
:root{
  --bg-white:#FFFFFF;
  --bg-gray-50:#F9FAFB;
  --bg-gray-100:#F2F4F6;
  --text-primary:#191F28;
  --text-secondary:#4E5968;
  --text-tertiary:#8B95A1;
  --border-default:#E5E8EB;
  --blue-primary:#3182F6;
  --blue-dark:#1B64DA;
  --blue-soft:#EBF4FF;
  --dark-accent:#202632;
  --red-soft:#FFF1F0;
  --red-strong:#F04452;
  --green-soft:#E8FAF0;
  --green-strong:#0AC282;
  --amber-soft:#FFF8E1;
  --amber-strong:#F5A623;
  --radius-sm:0.5rem;
  --radius-md:0.75rem;
  --radius-lg:1.25rem;
  --shadow-card:0 0.125rem 0.5rem rgba(25,31,40,0.06), 0 0.0625rem 0.125rem rgba(25,31,40,0.04);
  --shadow-float:0 0.75rem 2rem rgba(25,31,40,0.12);
}
*{margin:0;padding:0;box-sizing:border-box;}
html{
  /* 1080px 높이 기준 24px(=1rem) 비율로 전체 텍스트를 뷰포트에 비례 확대.
     대강당(300명+) 가독성 확보를 위해 표준 16px 대비 1.5배 상향.
     화면이 클수록 rem 기반 모든 폰트/여백이 함께 비례 확대됨. */
  font-size:calc(24 / 1080 * 100vh);
}
html,body{
  font-family:'Pretendard',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:#0E1116;
  color:var(--text-primary);
  -webkit-font-smoothing:antialiased;
  overscroll-behavior:none;
  width:100%;
  height:100%;
  overflow:hidden;
}
/* 발표 무대 — 화면 전체를 그대로 사용 (letterbox 없음) */
#stage{
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:0;
  background:#0E1116;
}
#app{
  position:relative;
  width:100vw;
  height:100vh;
  overflow:hidden;
  background:var(--bg-gray-50);
}
.slide{
  position:absolute;
  inset:0;
  display:flex;
  flex-direction:column;
  padding:0;
  opacity:0;
  visibility:hidden;
  pointer-events:none;
  transform:translateY(2.5rem) scale(0.94);
  transition:opacity .5s cubic-bezier(.22,.61,.36,1), transform .55s cubic-bezier(.22,.61,.36,1);
  overflow-y:auto;
  background:var(--bg-gray-50);
  perspective:87.5rem;
}
.slide.active{
  opacity:1;
  visibility:visible;
  pointer-events:auto;
  transform:translateY(0) scale(1);
}
.slide.prev{
  transform:translateY(-1.75rem) scale(0.94);
}
.slide-inner{
  max-width:none;
  margin:0;
  width:100%;
  padding:3.25rem 5.25rem 1.75rem;
  flex:1;
}
.slide-inner.vcenter{
  display:flex;flex-direction:column;justify-content:center;
}
.slide.center-content{justify-content:center;padding-bottom:4.75rem;}
/* 상단 진행바 */
.progress-wrap{
  position:absolute;
  top:0;left:0;right:0;
  height:0.375rem;
  background:var(--bg-gray-100);
  z-index:50;
}
.progress-bar{
  height:100%;
  background:linear-gradient(90deg,var(--blue-primary),var(--blue-dark));
  width:0%;
  transition:width .5s cubic-bezier(.22,.61,.36,1);
  border-radius:0 0.25rem 0.25rem 0;
  box-shadow:0 0 12px rgba(49,130,246,0.6);
}
/* 하단 네비게이션 */
.nav-bar{
  position:absolute;
  bottom:0;left:0;right:0;
  background:rgba(255,255,255,0.92);
  backdrop-filter:blur(0.75rem);
  border-top:1px solid var(--border-default);
  padding:0.75rem 1.375rem;
  display:flex;
  align-items:center;
  gap:0.75rem;
  z-index:50;
}
.nav-btn{
  flex:0 0 auto;
  width:3.25rem;height:3.25rem;
  border-radius:50%;
  border:none;
  background:var(--bg-gray-100);
  color:var(--text-primary);
  font-size:1.5rem;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
  transition:transform .15s ease, background .15s ease;
}
.nav-btn:active{transform:scale(0.9);}
.nav-btn.primary{
  background:var(--blue-primary);
  color:#fff;
}
.nav-btn:disabled{opacity:0.35;cursor:default;}
.nav-mid{
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:0.125rem;
  cursor:pointer;
}
.nav-counter{
  font-size:1rem;
  font-weight:600;
  color:var(--text-secondary);
}
.nav-section-name{
  font-size:0.875rem;
  color:var(--text-tertiary);
  max-width:20rem;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}
/* 목차 오버레이 */
.toc-overlay{
  position:absolute;
  inset:0;
  background:rgba(25,31,40,0.55);
  z-index:80;
  display:flex;
  align-items:flex-end;
  opacity:0;
  pointer-events:none;
  transition:opacity .3s ease;
}
.toc-overlay.show{opacity:1;pointer-events:auto;}
.toc-sheet{
  background:var(--bg-white);
  width:100%;
  max-height:82%;
  border-radius:1.5rem 1.5rem 0 0;
  padding:1.25rem 1.5rem 1.5rem;
  overflow-y:auto;
  transform:translateY(100%);
  transition:transform .35s cubic-bezier(.22,.61,.36,1);
}
#tocList{
  display:grid;
  grid-template-columns:repeat(3, 1fr);
  gap:0.125rem 0.875rem;
}
.toc-overlay.show .toc-sheet{transform:translateY(0);}
.toc-handle{
  width:2.5rem;height:0.25rem;background:var(--border-default);
  border-radius:0.25rem;margin:0 auto 1rem;
}
.toc-title{font-size:1.375rem;font-weight:700;margin-bottom:1rem;grid-column:1/-1;}
.toc-item{
  display:flex;align-items:center;gap:0.625rem;
  padding:0.5625rem 0.625rem;
  border-radius:0.625rem;
  cursor:pointer;
  transition:background .15s;
}
.toc-item:active{background:var(--bg-gray-100);}
.toc-item.current{background:var(--blue-soft);}
.toc-num{
  width:1.625rem;height:1.625rem;border-radius:50%;
  background:var(--bg-gray-100);
  display:flex;align-items:center;justify-content:center;
  font-size:0.75rem;font-weight:700;color:var(--text-secondary);
  flex:0 0 auto;
}
.toc-item.current .toc-num{background:var(--blue-primary);color:#fff;}
.toc-label{font-size:0.875rem;font-weight:500;color:var(--text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

/* 공통 타이포 */
.eyebrow{
  display:inline-flex;align-items:center;gap:0.5rem;
  font-size:1.375rem;font-weight:800;color:var(--blue-primary);
  background:var(--blue-soft);
  padding:0.75rem 1.5rem;border-radius:1.875rem;
  margin-bottom:1.5rem;
}
.h1{font-size:4rem;font-weight:800;line-height:1.22;color:var(--text-primary);letter-spacing:-0.0625rem;}
.h2{font-size:2.625rem;font-weight:700;line-height:1.35;color:var(--text-primary);letter-spacing:-0.0312rem;}
.h3{font-size:2rem;font-weight:700;line-height:1.4;color:var(--text-primary);}
.body-text{font-size:1.75rem;line-height:1.6;color:var(--text-secondary);}
.small-text{font-size:1.375rem;line-height:1.55;color:var(--text-tertiary);}
.accent{color:var(--blue-primary);font-weight:800;}

.card{
  background:var(--bg-white);
  border-radius:1.75rem;
  padding:2.25rem 2.5rem;
  box-shadow:var(--shadow-card);
  margin-bottom:1.375rem;
}
.card-flat{
  background:var(--bg-gray-100);
  border-radius:1.75rem;
  padding:1.875rem 2.125rem;
  margin-bottom:1.125rem;
}
.divider{height:0.0625rem;background:var(--border-default);margin:1.125rem 0;}

/* 배지 */
.badge{display:inline-flex;align-items:center;gap:0.375rem;padding:0.625rem 1.25rem;border-radius:0.875rem;font-size:1.25rem;font-weight:800;}
.badge-blue{background:var(--blue-soft);color:var(--blue-primary);}
.badge-red{background:var(--red-soft);color:var(--red-strong);}
.badge-green{background:var(--green-soft);color:var(--green-strong);}
.badge-amber{background:var(--amber-soft);color:var(--amber-strong);}
.badge-gray{background:var(--bg-gray-100);color:var(--text-secondary);}

/* 등장 애니메이션 (slide 진입시 stagger) */
.reveal{opacity:0;transform:translateY(1.625rem) scale(0.96);transition:opacity .55s cubic-bezier(.22,.61,.36,1), transform .55s cubic-bezier(.22,.61,.36,1);}
.slide.active .reveal{opacity:1;transform:translateY(0) scale(1);}
.slide.active .r1{transition-delay:.04s;}
.slide.active .r2{transition-delay:.10s;}
.slide.active .r3{transition-delay:.16s;}
.slide.active .r4{transition-delay:.22s;}
.slide.active .r5{transition-delay:.28s;}
.slide.active .r6{transition-delay:.34s;}
.slide.active .r7{transition-delay:.40s;}
.slide.active .r8{transition-delay:.46s;}

/* 펀치 카운터 */
@keyframes countPop{
  0%{transform:scale(0.6);opacity:0;}
  60%{transform:scale(1.08);opacity:1;}
  100%{transform:scale(1);opacity:1;}
}
.pop{animation:countPop .5s cubic-bezier(.34,1.56,.64,1) both;}

/* 펄스 (위험/경고) */
@keyframes pulseRing{
  0%{box-shadow:0 0 0 0 rgba(240,68,82,0.35);}
  70%{box-shadow:0 0 0 14px rgba(240,68,82,0);}
  100%{box-shadow:0 0 0 0 rgba(240,68,82,0);}
}
.pulse{animation:pulseRing 1.8s ease-out infinite;}

@keyframes pulseRingBlue{
  0%{box-shadow:0 0 0 0 rgba(49,130,246,0.35);}
  70%{box-shadow:0 0 0 14px rgba(49,130,246,0);}
  100%{box-shadow:0 0 0 0 rgba(49,130,246,0);}
}
.pulse-blue{animation:pulseRingBlue 1.8s ease-out infinite;}

@keyframes float{
  0%,100%{transform:translateY(0) rotate(0deg);}
  50%{transform:translateY(-0.875rem) rotate(4deg);}
}
.float{animation:float 4s ease-in-out infinite;}

@keyframes shake{
  0%,100%{transform:translateX(0);}
  20%{transform:translateX(-0.25rem);}
  40%{transform:translateX(0.25rem);}
  60%{transform:translateX(-0.1875rem);}
  80%{transform:translateX(0.1875rem);}
}
.shake-once{animation:shake .5s ease;}

@keyframes spin{to{transform:rotate(360deg);}}
.spin-slow{animation:spin 6s linear infinite;}

/* 타임라인 */
.timeline{position:relative;padding-left:2.625rem;}
.timeline::before{
  content:'';position:absolute;left:0.5625rem;top:0.25rem;bottom:0.25rem;width:0.125rem;
  background:var(--border-default);
}
.tl-item{position:relative;margin-bottom:1.375rem;}
.tl-dot{
  position:absolute;left:-1.75rem;top:0.125rem;
  width:1.25rem;height:1.25rem;border-radius:50%;
  background:var(--blue-primary);
  border:3px solid var(--bg-white);
  box-shadow:0 0 0 2px var(--blue-primary);
}

/* OX 퀴즈 버튼 */
.ox-row{display:flex;gap:2rem;margin:2.25rem auto;max-width:56.25rem;}
.ox-btn{
  flex:1;
  padding:3rem 0;
  border-radius:2rem;
  border:3px solid var(--border-default);
  background:var(--bg-white);
  font-size:4.5rem;font-weight:800;
  cursor:pointer;
  transition:all .18s cubic-bezier(.34,1.56,.64,1);
  color:var(--text-tertiary);
  box-shadow:var(--shadow-card);
}
.ox-btn.o-btn:hover{border-color:var(--blue-primary);transform:translateY(-0.25rem);}
.ox-btn.x-btn:hover{border-color:var(--red-strong);transform:translateY(-0.25rem);}
.ox-btn.selected-o{background:var(--blue-soft);border-color:var(--blue-primary);color:var(--blue-primary);animation:btnBounce .45s cubic-bezier(.34,1.56,.64,1);}
.ox-btn.selected-x{background:var(--red-soft);border-color:var(--red-strong);color:var(--red-strong);animation:btnBounce .45s cubic-bezier(.34,1.56,.64,1);}
@keyframes btnBounce{
  0%{transform:scale(1);}
  40%{transform:scale(1.12);}
  100%{transform:scale(1.04);}
}
.ox-btn.correct-flash{animation:correctFlash .6s ease;}
.ox-btn.wrong-flash{animation:wrongFlash .5s ease;}
@keyframes correctFlash{
  0%{box-shadow:0 0 0 0 rgba(10,194,130,0.5);}
  100%{box-shadow:0 0 0 18px rgba(10,194,130,0);}
}
@keyframes wrongFlash{
  0%,100%{transform:translateX(0) scale(1.04);}
  25%{transform:translateX(-0.375rem) scale(1.04);}
  75%{transform:translateX(0.375rem) scale(1.04);}
}
.quiz-feedback{
  margin:1.25rem auto 0;max-width:68.75rem;
  padding:1.625rem 2rem;border-radius:1.5rem;
  font-size:1.5625rem;line-height:1.55;font-weight:600;
  display:none;
}
.quiz-feedback.show{display:block;}
.quiz-feedback.correct{background:var(--green-soft);color:#0a8a5f;}
.quiz-feedback.wrong{background:var(--red-soft);color:#c8333e;}

/* 토론 질문 카드 */
.discuss-card{
  background:linear-gradient(135deg,#EBF4FF 0%,#F5F9FF 100%);
  border:2px dashed var(--blue-primary);
  border-radius:1.75rem;
  padding:2rem 2.25rem;
  margin-bottom:1.25rem;
  position:relative;
}
.discuss-num{
  width:2.875rem;height:2.875rem;border-radius:50%;
  background:var(--blue-primary);color:#fff;
  font-size:1.375rem;font-weight:700;
  display:flex;align-items:center;justify-content:center;
  flex:0 0 auto;
}
.discuss-q{display:flex;gap:1.125rem;align-items:flex-start;font-size:1.75rem;font-weight:700;color:var(--text-primary);line-height:1.45;}

/* 비교 테이블형 */
.cmp-table{width:100%;border-collapse:separate;border-spacing:0;}
.cmp-table th{
  font-size:1.375rem;color:var(--text-tertiary);font-weight:800;
  padding:1.125rem 1rem;text-align:left;border-bottom:3px solid var(--border-default);
}
.cmp-table td{
  font-size:1.4375rem;padding:1.25rem 1rem;border-bottom:1px solid var(--border-default);
  color:var(--text-primary);
}
.cmp-table tr:last-child td{border-bottom:none;}

/* 스토리 말풍선 */
.speech-bubble{
  background:var(--bg-white);
  border-radius:1.75rem;
  padding:2rem 2.25rem;
  position:relative;
  box-shadow:var(--shadow-card);
  font-size:1.75rem;
  line-height:1.55;
  color:var(--text-primary);
  font-weight:600;
}
.speech-bubble::before{
  content:'';
  position:absolute;
  left:1.75rem;bottom:-0.5625rem;
  width:0;height:0;
  border-left:10px solid transparent;
  border-right:10px solid transparent;
  border-top:10px solid var(--bg-white);
}
.speaker-tag{
  display:flex;align-items:center;gap:0.5rem;margin-bottom:0.5rem;
}
.speaker-avatar{
  width:3.625rem;height:3.625rem;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:1.75rem;
  background:var(--bg-gray-100);
}
.speaker-name{font-size:1.25rem;font-weight:800;color:var(--text-secondary);}

/* 체크리스트 */
.check-item{
  display:flex;align-items:flex-start;gap:1.25rem;
  padding:1.125rem 0;
  border-bottom:1px solid var(--border-default);
}
.check-item:last-child{border-bottom:none;}
.check-num{
  width:2.5rem;height:2.5rem;border-radius:50%;
  background:var(--blue-soft);color:var(--blue-primary);
  font-size:1.25rem;font-weight:800;
  display:flex;align-items:center;justify-content:center;
  flex:0 0 auto;margin-top:0.0625rem;
}
.check-text{font-size:1.625rem;color:var(--text-primary);line-height:1.5;font-weight:500;}

/* 큰 인용 / 핵심 한줄 */
.key-line{
  background:var(--dark-accent);
  color:#fff;
  border-radius:1.75rem;
  padding:2.5rem 2.75rem;
  font-size:1.875rem;
  font-weight:700;
  line-height:1.55;
  position:relative;
  overflow:hidden;
}
.key-line .quote-mark{
  position:absolute;
  right:1.125rem;top:0.375rem;
  font-size:5rem;
  font-weight:800;
  color:rgba(255,255,255,0.08);
  font-family:Georgia,serif;
}
.key-line .label{
  display:inline-block;font-size:1.1875rem;font-weight:800;color:#9DC4FF;
  margin-bottom:0.75rem;letter-spacing:0.0312rem;
}

/* 위험 경고 박스 */
.warn-box{
  background:var(--red-soft);
  border-left:6px solid var(--red-strong);
  border-radius:1.25rem;
  padding:1.625rem 1.875rem;
  margin-bottom:1.125rem;
}
.warn-title{display:flex;align-items:center;gap:0.625rem;font-size:1.5625rem;font-weight:800;color:var(--red-strong);margin-bottom:0.5rem;}
.ok-box{
  background:var(--green-soft);
  border-left:6px solid var(--green-strong);
  border-radius:1.25rem;
  padding:1.625rem 1.875rem;
  margin-bottom:1.125rem;
}
.ok-title{display:flex;align-items:center;gap:0.625rem;font-size:1.5625rem;font-weight:800;color:#0a8a5f;margin-bottom:0.5rem;}

/* 케이스 표지 (대형 섹션 슬라이드) */
.case-cover{
  height:100%;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  text-align:center;
  padding:3rem 3.5rem;
  position:relative;
}
.case-cover .case-num-huge{
  font-size:13.75rem;
  font-weight:800;
  background:linear-gradient(135deg,var(--blue-primary),var(--blue-dark));
  -webkit-background-clip:text;
  background-clip:text;
  -webkit-text-fill-color:transparent;
  line-height:1;
  margin-bottom:0.5rem;
}
.case-cover .case-tag{
  font-size:1.625rem;font-weight:800;color:var(--blue-primary);
  letter-spacing:0.25rem;margin-bottom:1.75rem;
}
.case-cover .case-title{
  font-size:4.75rem;font-weight:800;line-height:1.28;color:var(--text-primary);margin-bottom:1.75rem;
}
.case-cover .case-meta{
  font-size:1.375rem;color:var(--text-tertiary);
  background:var(--bg-white);
  padding:1.125rem 2.125rem;border-radius:1.875rem;
  box-shadow:var(--shadow-card);
}
.bg-deco{
  position:absolute;border-radius:50%;
  background:radial-gradient(circle,rgba(49,130,246,0.10),transparent 70%);
}

/* 워드 카드 (용어 정리) */
.term-card{
  background:var(--bg-white);
  border-radius:1.75rem;
  padding:1.875rem 2.125rem;
  margin-bottom:1.25rem;
  box-shadow:var(--shadow-card);
  display:flex;
  gap:1.5rem;
  align-items:flex-start;
}
.term-icon{
  width:4.25rem;height:4.25rem;border-radius:1.125rem;
  background:var(--blue-soft);
  display:flex;align-items:center;justify-content:center;
  font-size:2.125rem;flex:0 0 auto;
}
.term-name{font-size:1.75rem;font-weight:800;color:var(--text-primary);margin-bottom:0.4375rem;}
.term-desc{font-size:1.4375rem;color:var(--text-secondary);line-height:1.5;}

/* 선택지 카드(선택1/2/3) */
.option-grid{display:flex;flex-direction:column;gap:0.625rem;}
.option-card{
  background:var(--bg-white);
  border-radius:1.25rem;
  padding:1.625rem 1.875rem;
  border:2px solid var(--border-default);
  display:flex;gap:1.25rem;align-items:flex-start;font-size:1.5625rem;font-weight:500;
}
.option-card.best{border-color:var(--blue-primary);background:var(--blue-soft);}
.option-num{
  width:2.625rem;height:2.625rem;border-radius:0.75rem;
  background:var(--bg-gray-100);color:var(--text-secondary);
  font-size:1.25rem;font-weight:800;
  display:flex;align-items:center;justify-content:center;flex:0 0 auto;
}
.option-card.best .option-num{background:var(--blue-primary);color:#fff;}

/* 프로그레스 도트 (케이스 진행 인디케이터, 상단) */
.case-progress-dots{display:flex;gap:0.375rem;justify-content:center;margin-top:1.5rem;}
.case-progress-dots span{
  width:0.5rem;height:0.5rem;border-radius:50%;background:var(--border-default);
}

/* 인터랙티브 토글 (정답 보기) */
.reveal-btn{
  margin-top:1.375rem;
  padding:1.375rem 2.25rem;
  border-radius:1.25rem;
  border:none;
  background:var(--dark-accent);
  color:#fff;
  font-size:1.5rem;font-weight:700;
  cursor:pointer;
  display:inline-flex;align-items:center;gap:0.375rem;
  transition:transform .15s;
}
.reveal-btn:active{transform:scale(0.96);}
.answer-panel{
  display:none;
  margin-top:0.75rem;
  animation:slideDown .35s cubic-bezier(.22,.61,.36,1) both;
}
.answer-panel.show{display:block;}
@keyframes slideDown{
  from{opacity:0;transform:translateY(-0.5rem);max-height:0;}
  to{opacity:1;transform:translateY(0);}
}

/* confetti dots for finale */
.confetti{
  position:absolute;width:0.75rem;height:0.75rem;border-radius:0.1875rem;
  animation:confettiFall 1.6s ease-in forwards;
  opacity:0.95;
  z-index:60;
  top:-1.25rem;
}
@keyframes confettiFall{
  0%{transform:translateY(0) rotate(0deg);opacity:1;}
  100%{transform:translateY(33.75rem) rotate(420deg);opacity:0;}
}

/* 스와이프 힌트 */
.swipe-hint{
  position:absolute;
  bottom:5rem;right:1.5rem;
  font-size:0.8125rem;color:var(--text-tertiary);
  display:flex;align-items:center;gap:0.25rem;
  opacity:0.8;
  z-index:40;
  pointer-events:none;
  animation:fadeOutHint 4s forwards;
}
@keyframes fadeOutHint{0%,70%{opacity:0.8;}100%{opacity:0;}}

/* 표 스크롤 wrap */
.table-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;}

::-webkit-scrollbar{width:0;height:0;}


/* ===== 모바일 호환/시인성 보강 패치 ===== */
.fullscreen-fab{
  position:absolute;
  top:calc(0.75rem + env(safe-area-inset-top));
  right:0.875rem;
  z-index:65;
  border:none;
  border-radius:999px;
  padding:0.625rem 0.875rem;
  background:rgba(25,31,40,0.82);
  color:#fff;
  font-size:0.9375rem;
  font-weight:800;
  letter-spacing:-0.01em;
  box-shadow:var(--shadow-float);
  backdrop-filter:blur(0.75rem);
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
}
.fullscreen-fab:active{transform:scale(0.96);}
.fs-btn{background:var(--dark-accent);color:#fff;}
.fs-toast{
  position:absolute;
  left:50%;
  bottom:calc(5.25rem + env(safe-area-inset-bottom));
  transform:translateX(-50%) translateY(1rem);
  background:rgba(25,31,40,0.92);

  font-size:0.9375rem;
  font-weight:800;
  z-index:90;
  opacity:0;
  pointer-events:none;
  transition:opacity .22s ease, transform .22s ease;
  max-width:calc(100vw - 2rem);
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.fs-toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
body.presentation-fullscreen{background:#0E1116;}
body.presentation-fullscreen .fullscreen-fab,
:fullscreen .fullscreen-fab,
:-webkit-full-screen .fullscreen-fab{background:rgba(49,130,246,0.88);}

// 케이스별 OX 슬라이드 묶음을 SLIDES에 삽입하는 헬퍼
function addCaseQuiz(caseNum){
  const items = OX_QUIZ.map((it, gi) => ({...it, gi})).filter(it => it.c === caseNum);
  if(!items.length) return;
  // 인트로
  addSlide(`케이스${caseNum} OX 워밍업`, `
  <div class="slide-inner vcenter">
    <div class="reveal r1" style="font-size:4.5rem;margin-bottom:1.25rem;">☑️</div>
    <div class="reveal r2 eyebrow">WARM-UP · CASE ${caseNum}</div>
    <div class="reveal r3 h1" style="margin-bottom:1.25rem;">먼저 OX로 감 잡기</div>
    <div class="reveal r4 body-text" style="margin-bottom:2rem;">케이스 ${caseNum}을 들어가기 전에 <b class="accent">${items.length}문항</b>을 먼저 풀어봅니다.<br>지금은 정답을 몰라도 괜찮습니다 — 뒤에서 사례로 확인합니다.</div>
    <div class="reveal r5 key-line">
      <span class="label">📌 진행 방법</span>
      각자 O / X를 머릿속으로 정한 뒤 화면을 넘기세요.<br>버튼을 누르면 <b>정답과 간단 해설</b>이 나타납니다.
    </div>
  </div>
  `);
  // 각 문항
  items.forEach((item, localIdx) => {
    addSlide(`케이스${caseNum} OX ${localIdx+1}/${items.length}`, `
    <div class="slide-inner vcenter">
      <div class="reveal r1" style="display:flex;justify-content:center;margin-bottom:1.75rem;">
        <span class="badge badge-amber">CASE ${caseNum} · OX ${localIdx+1} / ${items.length}</span>
      </div>
      <div class="reveal r2 card" style="padding:3rem 2.5rem;">
        <div class="h2" style="line-height:1.5;text-align:center;">${item.q}</div>
      </div>
      <div class="reveal r3 ox-row" id="oxRow-${item.gi}">
        <button class="ox-btn o-btn" onclick="answerOX(${item.gi}, true)">O</button>
        <button class="ox-btn x-btn" onclick="answerOX(${item.gi}, false)">X</button>
      </div>
      <div class="reveal r4 quiz-feedback" id="oxFeedback-${item.gi}"></div>
    </div>
    `);
  });
}

  </div>
  </div>
</div>
`);

  <div class="reveal r3 term-card"><div class="term-icon">📘</div><div><div class="term-name">교재 안내</div><div class="term-desc">수신업무방법서 2026년 1월 30일 현행 기준으로 작성되었습니다.</div></div></div>
  <div class="reveal r4 term-card"><div class="term-icon">🎓</div><div><div class="term-name">대상</div><div class="term-desc">새마을금고 수신업무 신입직원 2시간 토론형 교육을 위해 제작되었습니다.</div></div></div>

  <button class="reveal-btn" onclick="restartLecture()" style="width:100%;justify-content:center;margin-top:1.375rem;background:var(--blue-primary);">🔁 처음부터 다시보기</button>

</script>
<script>
// ===== 앱 동작 로직 =====
(function(){
  let current = 0;
  const total = SLIDES.length;
  const appEl = document.getElementById('app');
  const progressBar = document.getElementById('progressBar');
  const navCounter = document.getElementById('navCounter');
  const navSection = document.getElementById('navSection');
  const btnPrev = document.getElementById('btnPrev');
  const btnNext = document.getElementById('btnNext');
  const btnFullscreen = document.getElementById('btnFullscreen');
  const btnFullscreenFab = document.getElementById('btnFullscreenFab');
  const fsToast = document.getElementById('fsToast');
  const tocOverlay = document.getElementById('tocOverlay');
  const tocList = document.getElementById('tocList');

  // 슬라이드 DOM 렌더링 (1회)
  SLIDES.forEach((s, idx) => {
    const div = document.createElement('div');
    div.className = 'slide';
    div.dataset.index = idx;
    div.innerHTML = s.html;
    appEl.appendChild(div);
  });

  function buildSelfCheckTable(){
    const rows1 = [
      "대리인 지급—위임장+인감증명서 원칙",
      "편의취급—1일 100만원 이하, 2회",
      "질권설정 예금 지급정지 원칙",
      "사망 인지→즉시 출금정지 원칙",
      "소액상속 기준—500만원, 300만원"
    ];
    const rows2 = [
      "특정유증→수증자에게 직접 지급 안 됨",
      "법원 서류→즉시 출금정지",
      "전부명령→확정증명서 필수",
      "체납처분→가압류보다 우선",
      "압류금지 예금→250만원 이하(2026년 기준)"
    ];
    function fill(selector, rows){
      const table = document.querySelector(selector);
      if(!table) return;
      rows.forEach((label) => {
        const tr = document.createElement('tr');
        tr.innerHTML = `<td>${label}</td>
          <td style="text-align:center;"><input type="checkbox" style="width:1.75rem;height:1.75rem;accent-color:var(--blue-primary);"></td>
          <td style="text-align:center;"><input type="checkbox" style="width:1.75rem;height:1.75rem;accent-color:var(--amber-strong);"></td>`;
        table.appendChild(tr);
      });
    }
    fill('#selfCheckCard1 table', rows1);
    fill('#selfCheckCard2 table', rows2);
  }
  buildSelfCheckTable();

  function renderToc(){
    tocList.innerHTML = '';
    SLIDES.forEach((s, idx) => {
      const item = document.createElement('div');
      item.className = 'toc-item' + (idx === current ? ' current' : '');
      item.innerHTML = `<div class="toc-num">${idx+1}</div><div class="toc-label">${s.section}</div>`;
      item.onclick = () => { goTo(idx); closeToc(); };
      tocList.appendChild(item);
    });
  }

  function openToc(){ renderToc(); tocOverlay.classList.add('show'); }
  function closeToc(){ tocOverlay.classList.remove('show'); }
  tocOverlay.addEventListener('click', (e) => { if(e.target === tocOverlay) closeToc(); });

  function fitActive(el){
    el.scrollTop = 0;
    appEl.scrollTop = 0;
    const inner = el.querySelector('.slide-inner, .case-cover');
    if(!inner) return;
    inner.style.transform = '';
    if(inner.classList.contains('case-cover')) return;
    // flex:1 + align-items:stretch(부모 기본값) 조합 때문에 scrollHeight가
    // 부모 높이로 강제 확장되어 측정되는 버그 -> flex/align-self 임시 해제 후 측정
    const prevFlex = inner.style.flex;
    const prevAlignSelf = inner.style.alignSelf;
    const prevHeight = inner.style.height;
    inner.style.flex = '0 0 auto';
    inner.style.alignSelf = 'flex-start';
    inner.style.height = 'auto';
    const navH = document.querySelector('.nav-bar')?.offsetHeight || 0;
    const isMobile = window.matchMedia('(max-width: 768px)').matches;
    const avail = el.clientHeight - navH - (isMobile ? 22 : 34);      // 무대 높이 - 하단 nav - 여유 마진
    const needed = inner.scrollHeight;        // 콘텐츠 실제(자연) 높이
    const isVcenter = inner.classList.contains('vcenter');
    if(needed > avail){
      // vcenter는 height:auto + flex:0(축소된 콘텐츠 박스) 상태를 그대로 유지한 채 스케일 적용.
      // flex:1로 재확장하면 박스가 다시 전체 높이로 늘어나 스케일 기준점이 어긋나
      // 화면 밖으로 넘치는 버그가 생기므로, vcenter일 때만 auto 상태를 유지한다.
      if(!isVcenter){
        inner.style.flex = prevFlex;
        inner.style.alignSelf = prevAlignSelf;
        inner.style.height = prevHeight;
        el.classList.remove('center-content');
      } else {
        // vcenter는 박스가 콘텐츠 크기로 줄었으므로, 부모(.slide)의 중앙정렬로 화면 중앙에 배치
        el.classList.add('center-content');
      }
      const scale = Math.max(0.62, avail / needed);
      inner.style.transformOrigin = isVcenter ? 'center center' : 'top center';
      inner.style.transform = 'scale(' + scale + ')';
    } else {
      inner.style.flex = prevFlex;
      inner.style.alignSelf = prevAlignSelf;
      inner.style.height = prevHeight;
      if(needed < avail * 0.97){
        // 여유 있으면 세로 중앙 배치 (임계값 상향: 화면을 더 적극적으로 채움)
        el.classList.add('center-content');
      } else {
        el.classList.remove('center-content');
      }
    }
  }

  function render(){
    const slides = appEl.querySelectorAll('.slide');
    slides.forEach((el, idx) => {
      el.classList.remove('active','prev');
      if(idx === current){
        el.classList.add('active');
        el.scrollTop = 0;
        requestAnimationFrame(() => fitActive(el));
      } else if(idx === current - 1){
        el.classList.add('prev');
      }
    });
    progressBar.style.width = ((current+1)/total*100) + '%';
    navCounter.textContent = (current+1) + ' / ' + total;
    navSection.textContent = SLIDES[current].section;
    btnPrev.disabled = current === 0;
    btnNext.disabled = false;
    btnNext.textContent = (current === total-1) ? '↺' : '›';
  }

  function goTo(idx){
    if(idx < 0) idx = 0;
    if(idx > total-1) idx = total-1;
    current = idx;
    render();
  }

  function next(){
    if(current === total-1){ goTo(0); return; }
    goTo(current+1);
  }
  function prev(){ goTo(current-1); }

  btnNext.addEventListener('click', next);
  btnPrev.addEventListener('click', prev);
  document.getElementById('navMid').addEventListener('click', openToc);

  // 키보드 네비게이션 (일반 키보드 + 프레젠테이션 클리커 대응)
  document.addEventListener('keydown', (e) => {
    const k = e.key;
    if(k === 'ArrowRight' || k === ' ' || k === 'PageDown' || k === 'Spacebar'){
      e.preventDefault(); next();
    } else if(k === 'ArrowLeft' || k === 'PageUp' || k === 'Backspace'){
      e.preventDefault(); prev();
    } else if(k === 'Escape'){
      closeToc();
    } else if(k === 'Home'){
      e.preventDefault(); goTo(0);
    } else if(k === 'End'){
      e.preventDefault(); goTo(total-1);
    } else if(k === 'f' || k === 'F'){
      toggleFullscreen();
    }
  });

  // 풀스크린 토글: Android/Chrome/Edge는 네이티브 fullscreen, iPhone Safari 등은 화면 집중용 pseudo fullscreen으로 대체
  function getFullscreenElement(){
    return document.fullscreenElement || document.webkitFullscreenElement || document.msFullscreenElement || null;
  }
  function updateFullscreenButton(){
    const isFs = !!getFullscreenElement() || document.body.classList.contains('presentation-fullscreen');
    if(btnFullscreen) btnFullscreen.textContent = isFs ? '↙' : '⛶';
    if(btnFullscreenFab) btnFullscreenFab.textContent = isFs ? '↙ 축소' : '⛶ 전체화면';
    document.body.classList.toggle('presentation-fullscreen', isFs);
    const activeSlide = appEl.querySelector('.slide.active');
    if(activeSlide) requestAnimationFrame(() => fitActive(activeSlide));
  }
  function showFsToast(message){
    if(!fsToast) return;
    fsToast.textContent = message;
    fsToast.classList.add('show');
    clearTimeout(showFsToast.timer);
    showFsToast.timer = setTimeout(() => fsToast.classList.remove('show'), 1800);
  }
  function enterPseudoFullscreen(){
    document.body.classList.add('presentation-fullscreen');
    window.scrollTo(0,0);
    updateFullscreenButton();
    showFsToast('브라우저 제한으로 화면 집중 모드로 전환했습니다');
  }
  function toggleFullscreen(){
    const docEl = document.documentElement;
    const fsEl = getFullscreenElement();
    const request = docEl.requestFullscreen || docEl.webkitRequestFullscreen || docEl.msRequestFullscreen;
    const exit = document.exitFullscreen || document.webkitExitFullscreen || document.msExitFullscreen;

    if(fsEl || document.body.classList.contains('presentation-fullscreen')){
      document.body.classList.remove('presentation-fullscreen');
      if(fsEl && exit){
        const result = exit.call(document);
        if(result && result.catch) result.catch(() => {});
      }
      updateFullscreenButton();
      return;
    }

    if(request){
      try{
        const result = request.call(docEl);
        if(result && result.then){
          result.then(() => { updateFullscreenButton(); showFsToast('전체화면으로 전환했습니다'); })
                .catch(() => enterPseudoFullscreen());
        } else {
          setTimeout(() => { updateFullscreenButton(); showFsToast('전체화면으로 전환했습니다'); }, 80);
        }
      } catch(err){
        enterPseudoFullscreen();
      }
    } else {
      enterPseudoFullscreen();
    }
  }
  ['fullscreenchange','webkitfullscreenchange','MSFullscreenChange'].forEach((name) => {
    document.addEventListener(name, updateFullscreenButton);
  });
  [btnFullscreen, btnFullscreenFab].forEach((btn) => {
    if(!btn) return;
    btn.addEventListener('click', (e) => { e.stopPropagation(); toggleFullscreen(); });
  });
  // 화면 빈 영역 더블클릭으로도 풀스크린 토글 (버튼/카드 등 인터랙티브 요소는 제외)
  appEl.addEventListener('dblclick', (e) => {
    if(e.target.closest('button, .ox-btn, .reveal-btn, .toc-item, input, a')) return;
    toggleFullscreen();
  });

  // 스와이프 네비게이션
  let touchStartX = 0, touchStartY = 0;
  appEl.addEventListener('touchstart', (e) => {
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
  }, {passive:true});
  appEl.addEventListener('touchend', (e) => {
    const dx = e.changedTouches[0].clientX - touchStartX;
    const dy = e.changedTouches[0].clientY - touchStartY;
    if(Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy)*1.5){
      if(dx < 0) next(); else prev();
    }
  }, {passive:true});

  // 모바일 전체화면 발표 중에는 좌/우 가장자리 탭으로 이전/다음 이동 가능
  appEl.addEventListener('click', (e) => {
    if(!window.matchMedia('(max-width: 768px)').matches) return;
    if(e.target.closest('button, .ox-btn, .reveal-btn, .toc-item, input, a, .nav-bar, .fullscreen-fab')) return;
    const x = e.clientX;
    const w = window.innerWidth;
    if(x < w * 0.16) prev();
    else if(x > w * 0.84) next();
  });

  render();
  window.addEventListener('resize', () => {
    const activeSlide = appEl.querySelector('.slide.active');
    if(activeSlide) requestAnimationFrame(() => fitActive(activeSlide));
  });

  // 첫 진입 스와이프 힌트
  setTimeout(() => {
    const hint = document.createElement('div');
    hint.className = 'swipe-hint';
    hint.innerHTML = '← 좌우로 스와이프 가능 →';
    document.body.appendChild(hint);
    setTimeout(() => hint.remove(), 4000);
  }, 600);

  // ===== OX 퀴즈 인터랙션 =====
  function spawnConfetti(anchorEl){
    const activeSlide = appEl.querySelector('.slide.active');
    if(!activeSlide) return;
    const colors = ['#3182F6','#0AC282','#F5A623','#F04452','#9DC4FF'];
    const rect = anchorEl.getBoundingClientRect();
    const slideRect = activeSlide.getBoundingClientRect();
    const originX = rect.left - slideRect.left + rect.width/2;
    for(let i=0;i<22;i++){
      const c = document.createElement('div');
      c.className = 'confetti';
      c.style.left = (originX + (Math.random()*240-120)) + 'px';
      c.style.background = colors[i % colors.length];
      c.style.animationDelay = (Math.random()*0.25) + 's';
      c.style.width = c.style.height = (8 + Math.random()*8) + 'px';
      activeSlide.appendChild(c);
      setTimeout(() => c.remove(), 2000);
    }
  }

  window.answerOX = function(idx, userAnswer){
    const item = OX_QUIZ[idx];
    const row = document.getElementById('oxRow-' + idx);
    const feedback = document.getElementById('oxFeedback-' + idx);
    if(row.dataset.answered === '1') return; // 중복 클릭 방지
    row.dataset.answered = '1';

    const btnO = row.querySelector('.o-btn');
    const btnX = row.querySelector('.x-btn');
    const isCorrect = (userAnswer === item.a);

    if(userAnswer){ btnO.classList.add('selected-o'); } else { btnX.classList.add('selected-x'); }
    const selectedBtn = userAnswer ? btnO : btnX;

    if(isCorrect){
      selectedBtn.classList.add('correct-flash');
      feedback.classList.add('show','correct');
      feedback.innerHTML = '✅ 정답입니다! ' + item.exp;
      spawnConfetti(row);
    } else {
      selectedBtn.classList.add('wrong-flash');
      feedback.classList.add('show','wrong');
      const correctLabel = item.a ? 'O' : 'X';
      feedback.innerHTML = '❌ 정답은 <b>' + correctLabel + '</b> 입니다. ' + item.exp;
      // 정답 쪽도 살짝 강조
      const correctBtn = item.a ? btnO : btnX;
      correctBtn.style.borderColor = 'var(--green-strong)';
    }
    // 피드백 펼쳐진 후 화면에 맞게 재조정 (스크롤 위치/포커스로 인한 어긋남 방지)
    const activeSlide = appEl.querySelector('.slide.active');
    if(activeSlide){
      activeSlide.scrollTop = 0;
      appEl.scrollTop = 0;
      if(document.activeElement && document.activeElement.blur) document.activeElement.blur();
      requestAnimationFrame(() => { activeSlide.scrollTop = 0; appEl.scrollTop = 0; fitActive(activeSlide); });
    }
  };

  // ===== 정답/멘트 토글 =====
  window.toggleAnswer = function(id){
    const el = document.getElementById(id);
    if(!el) return;
    el.classList.toggle('show');
    const activeSlide = appEl.querySelector('.slide.active');
    if(activeSlide){
      activeSlide.scrollTop = 0;
      appEl.scrollTop = 0;
      if(document.activeElement && document.activeElement.blur) document.activeElement.blur();
      requestAnimationFrame(() => { activeSlide.scrollTop = 0; appEl.scrollTop = 0; fitActive(activeSlide); });
    }
  };

  // ===== 처음부터 다시보기 =====
  window.restartLecture = function(){
    goTo(0);
    window.scrollTo(0,0);
  };

  // ===== 목차 버튼 (전역 노출, 필요시 다른 곳에서 호출) =====
  window.openToc = openToc;
})();

</script>
